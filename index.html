<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pumeon Productions — Find Your Package</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f2f6f8;
      --surface:#ffffff;
      --border:rgba(61,90,107,0.13);
      --border-hover:rgba(61,90,107,0.28);
      --border-strong:rgba(61,90,107,0.5);
      --text-primary:#1a2f3d;
      --text-secondary:#486070;
      --text-tertiary:#8aaabb;
      --accent:#3d5a6b;
      --accent-fg:#ffffff;
      --mint:#4ecba0;
      --mint-light:#e6f9f2;
      --mint-mid:rgba(78,203,160,0.18);
      --orange:#f0a055;
      --orange-light:#fef3e8;
      --radius-sm:6px;
      --radius-md:10px;
      --radius-lg:16px;
    }
    body{
      font-family:'DM Sans',sans-serif;
      background:var(--bg);
      color:var(--text-primary);
      min-height:100vh;
      display:flex;
      align-items:flex-start;
      justify-content:center;
      padding:2rem 1rem 5rem;
    }
    .card{
      background:var(--surface);
      border:0.5px solid var(--border);
      border-radius:var(--radius-lg);
      width:100%;
      max-width:580px;
      overflow:hidden;
      box-shadow:0 8px 40px rgba(61,90,107,0.10);
    }

    /* HEADER */
    .qhdr{
      text-align:center;
      padding:2.2rem 2rem 1.5rem;
      border-bottom:0.5px solid var(--border);
      background:linear-gradient(160deg,#eaf3f7 0%,#f8fafb 60%,#fff 100%);
      position:relative;
      overflow:hidden;
    }
    .qhdr::before{
      content:'';position:absolute;top:-40px;right:-40px;
      width:160px;height:160px;border-radius:50%;
      background:radial-gradient(circle,rgba(78,203,160,0.12) 0%,transparent 70%);
      pointer-events:none;
    }
    .logo-wrap{margin-bottom:0.9rem}
    .logo-wrap img{height:86px;width:auto;filter:drop-shadow(0 4px 12px rgba(61,90,107,0.15))}
    .brand{
      font-size:10px;font-weight:600;
      letter-spacing:0.25em;text-transform:uppercase;
      color:var(--mint);margin-bottom:0.4rem;
    }
    .qtitle{
      font-family:'Cormorant Garamond',serif;
      font-size:27px;font-weight:400;
      line-height:1.2;color:var(--text-primary);
    }
    .qsub{font-size:12px;color:var(--text-tertiary);margin-top:0.45rem}

    /* PROGRESS */
    .prog-wrap{height:3px;background:var(--border)}
    .prog-fill{
      height:100%;
      background:linear-gradient(90deg,var(--accent),var(--mint));
      transition:width 0.55s cubic-bezier(0.4,0,0.2,1);
    }
    .prog-label{
      font-size:10px;color:var(--text-tertiary);
      text-align:right;padding:6px 1.5rem 0;
      font-weight:500;letter-spacing:0.05em;
    }

    /* STEP */
    .step{padding:1.8rem 2rem 2rem;animation:fadeUp 0.38s ease both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    .slabel{
      font-size:10px;font-weight:600;
      letter-spacing:0.18em;text-transform:uppercase;
      color:var(--mint);margin-bottom:0.55rem;
    }
    .sq{
      font-family:'Cormorant Garamond',serif;
      font-size:23px;font-weight:400;
      margin-bottom:0.35rem;line-height:1.3;
    }
    .shint{font-size:12px;color:var(--text-secondary);margin-bottom:1.4rem;line-height:1.65}
    .multi-hint{font-size:11px;color:var(--text-tertiary);margin-bottom:0.8rem;font-style:italic}

    /* OPTIONS */
    .ogrid{display:grid;gap:9px}
    .obtn{
      display:flex;align-items:center;gap:13px;
      padding:13px 16px;
      background:var(--surface);
      border:1px solid var(--border-hover);
      border-radius:var(--radius-md);
      cursor:pointer;text-align:left;
      transition:border-color 0.18s,background 0.18s,box-shadow 0.18s,transform 0.12s;
      width:100%;
      font-family:'DM Sans',sans-serif;
      font-size:13px;color:var(--text-primary);
    }
    .obtn:hover{
      border-color:var(--mint);
      background:var(--mint-light);
      box-shadow:0 2px 10px rgba(78,203,160,0.13);
      transform:translateY(-1px);
    }
    .obtn.sel,.obtn.multi-sel{
      border:1.5px solid var(--accent);
      background:#edf3f7;
      box-shadow:0 2px 10px rgba(61,90,107,0.10);
    }
    .omark{
      width:20px;height:20px;border-radius:50%;
      border:1.5px solid var(--border-hover);
      flex-shrink:0;display:flex;align-items:center;justify-content:center;
      font-size:11px;color:var(--accent-fg);
      transition:background 0.18s,border 0.18s;
    }
    .obtn.sel .omark,.obtn.multi-sel .omark{background:var(--mint);border-color:var(--mint)}
    .otxt strong{display:block;font-weight:500;font-size:13px}
    .otxt span{font-size:11px;color:var(--text-secondary);margin-top:1px;display:block}
    .obtn-badge{
      margin-left:auto;flex-shrink:0;
      font-size:10px;font-weight:600;
      padding:3px 9px;border-radius:20px;
      background:var(--orange-light);color:#9a5500;
      border:1px solid rgba(240,160,85,0.3);
      letter-spacing:0.03em;
    }

    /* INPUTS */
    .field-wrap{margin-bottom:1rem}
    .field-wrap label{display:block;font-size:12px;color:var(--text-secondary);margin-bottom:6px;font-weight:500}
    .field-input{
      width:100%;padding:12px 14px;
      border:1px solid var(--border-hover);
      border-radius:var(--radius-md);
      font-family:'DM Sans',sans-serif;
      font-size:13px;color:var(--text-primary);
      background:var(--surface);outline:none;
      transition:border-color 0.2s,box-shadow 0.2s;
    }
    .field-input:focus{border-color:var(--mint);box-shadow:0 0 0 3px rgba(78,203,160,0.15)}
    .field-privacy{font-size:11px;color:var(--text-tertiary);margin-top:0.5rem}

    /* NAV */
    .navrow{display:flex;justify-content:space-between;align-items:center;margin-top:1.6rem}
    .bbk{
      background:none;border:none;
      font-family:'DM Sans',sans-serif;font-size:12px;
      color:var(--text-secondary);cursor:pointer;padding:8px 0;
    }
    .bbk:hover{color:var(--text-primary)}
    .bnxt{
      font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;
      padding:11px 26px;
      background:var(--accent);color:var(--accent-fg);
      border:none;border-radius:var(--radius-md);
      cursor:pointer;
      transition:opacity 0.2s,box-shadow 0.2s,transform 0.12s;
      box-shadow:0 3px 10px rgba(61,90,107,0.22);
      letter-spacing:0.01em;
    }
    .bnxt:disabled{opacity:0.28;cursor:default;box-shadow:none;transform:none}
    .bnxt:not(:disabled):hover{opacity:0.88;box-shadow:0 5px 16px rgba(61,90,107,0.3);transform:translateY(-1px)}

    /* INFO CALLOUT */
    .info-callout{
      background:var(--mint-light);
      border:1px solid rgba(78,203,160,0.3);
      border-radius:var(--radius-md);
      padding:11px 14px;
      font-size:12px;color:#1a5c42;
      margin-bottom:1.3rem;
      line-height:1.6;
      display:flex;gap:8px;align-items:flex-start;
    }

    /* URGENCY */
    .urgency-banner{
      background:var(--orange-light);
      border:1px solid rgba(240,160,85,0.35);
      border-radius:var(--radius-md);
      padding:11px 14px;
      font-size:12px;color:#8a4d00;
      margin-bottom:1.2rem;
      display:flex;align-items:flex-start;gap:9px;line-height:1.55;
    }

    /* RESULT */
    .rwrap{padding:1.8rem 2rem 2.5rem;animation:fadeUp 0.45s ease both}
    .reyebrow{
      font-size:10px;letter-spacing:0.18em;
      text-transform:uppercase;color:var(--mint);
      margin-bottom:0.4rem;font-weight:600;
    }
    .rhead{
      font-family:'Cormorant Garamond',serif;
      font-size:25px;font-weight:400;margin-bottom:0.4rem;
      line-height:1.25;
    }
    .rtag{font-size:12px;color:var(--text-secondary);margin-bottom:1.5rem;line-height:1.65}

    /* SUMMARY PILLS */
    .summary-strip{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:1.5rem}
    .sum-pill{
      font-size:11px;padding:4px 12px;
      border-radius:20px;
      border:1px solid var(--border-hover);
      color:var(--text-secondary);
      background:#f4f8fa;
    }
    .sum-pill.highlight{
      background:var(--mint-light);
      border-color:rgba(78,203,160,0.4);
      color:#1a5c42;font-weight:500;
    }

    /* TESTIMONIAL */
    .testimonial{
      background:var(--mint-light);
      border-left:3px solid var(--mint);
      border-radius:0 var(--radius-md) var(--radius-md) 0;
      padding:13px 16px;margin-bottom:1.4rem;
    }
    .tst-stars{color:var(--orange);font-size:13px;margin-bottom:5px}
    .tst-text{
      font-family:'Cormorant Garamond',serif;
      font-size:16px;font-weight:400;
      line-height:1.55;color:var(--text-primary);
      font-style:italic;margin-bottom:6px;
    }
    .tst-author{font-size:11px;color:var(--text-secondary)}

    /* PACKAGE CARDS */
    .pkcard{
      border:1px solid var(--border-hover);
      border-radius:var(--radius-lg);
      overflow:hidden;margin-bottom:1rem;
      cursor:pointer;
      transition:border-color 0.2s,transform 0.15s,box-shadow 0.2s;
      text-decoration:none;display:block;color:inherit;
    }
    .pkcard:hover{
      border-color:var(--mint);
      transform:translateY(-2px);
      box-shadow:0 8px 24px rgba(78,203,160,0.18);
    }
    .pkcard.rec{border:2px solid var(--accent)}
    .pkcard.rec:hover{border-color:var(--mint);box-shadow:0 8px 26px rgba(78,203,160,0.22)}
    .pkhdr{
      padding:14px 18px;
      border-bottom:0.5px solid var(--border);
      display:flex;align-items:flex-start;
      justify-content:space-between;gap:10px;
      background:linear-gradient(135deg,#f2f8fb,#f8fbfc);
    }
    .rbadge{
      font-size:10px;font-weight:600;
      letter-spacing:0.08em;text-transform:uppercase;
      background:var(--mint);color:#fff;
      padding:3px 10px;border-radius:20px;
      white-space:nowrap;flex-shrink:0;
    }
    .pkname{
      font-family:'Cormorant Garamond',serif;
      font-size:21px;font-weight:400;margin-bottom:2px;
    }
    .pkprice{font-size:12px;color:var(--text-secondary)}
    .pkbody{padding:13px 18px}
    .pkinc{font-size:12px;color:var(--text-secondary);line-height:1.95;list-style:none}
    .pkinc li{padding-left:14px;position:relative}
    .pkinc li::before{
      content:'';position:absolute;left:0;top:10px;
      width:6px;height:1.5px;background:var(--mint);
    }
    .pkbest{font-size:11px;color:var(--text-tertiary);margin-top:9px;font-style:italic}
    .pk-cta-hint{
      display:flex;align-items:center;gap:6px;
      font-size:12px;font-weight:600;color:var(--accent);
      margin-top:12px;padding-top:10px;
      border-top:0.5px solid var(--border);
    }
    .bilingual-flag{
      display:inline-block;font-size:11px;
      padding:2px 9px;border-radius:20px;
      background:var(--orange-light);
      border:1px solid rgba(240,160,85,0.3);
      color:#8a4d00;margin-left:8px;
      vertical-align:middle;font-family:'DM Sans',sans-serif;
    }
    .cocktail-note{
      font-size:11px;color:#1a5c42;background:var(--mint-light);
      margin-top:9px;padding:8px 10px;
      border-radius:var(--radius-sm);line-height:1.6;
    }
    .peak-note{
      font-size:11px;color:#8a4d00;background:var(--orange-light);
      margin-top:9px;padding:8px 10px;
      border-radius:var(--radius-sm);line-height:1.6;
      border:1px solid rgba(240,160,85,0.25);
    }

    /* ADDONS */
    .addons-box{
      border:1px solid var(--border);
      border-radius:var(--radius-md);
      padding:13px 16px;margin-bottom:1.2rem;
    }
    .addons-ttl{
      font-size:10px;font-weight:600;
      letter-spacing:0.13em;text-transform:uppercase;
      color:var(--text-secondary);margin-bottom:10px;
    }
    .addons-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px 14px}
    .ai{display:flex;justify-content:space-between;font-size:12px;color:var(--text-secondary)}
    .ap{color:var(--accent);font-weight:600}

    /* SOCIAL */
    .social-strip{
      display:flex;align-items:center;justify-content:center;
      gap:9px;margin-bottom:1.2rem;flex-wrap:wrap;
      padding:14px 16px;
      background:linear-gradient(135deg,#eaf3f7,var(--mint-light));
      border-radius:var(--radius-md);
      border:1px solid rgba(78,203,160,0.2);
    }
    .social-strip p{font-size:12px;color:var(--text-secondary);width:100%;text-align:center;margin-bottom:2px}
    .social-link{
      display:inline-flex;align-items:center;gap:6px;
      font-size:12px;font-weight:600;
      text-decoration:none;padding:8px 16px;
      border-radius:var(--radius-md);
      transition:opacity 0.2s,transform 0.15s;
      letter-spacing:0.01em;
    }
    .social-link:hover{opacity:0.85;transform:translateY(-1px)}
    .social-link.web{background:var(--accent);color:#fff}
    .social-link.ig{background:linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);color:#fff}

    /* SAVE BOX */
    .save-box{
      border:1px solid var(--border-hover);
      border-radius:var(--radius-md);
      padding:14px 16px;margin-bottom:1.2rem;
      background:#f8fbfc;
    }
    .save-box-title{font-size:12px;font-weight:600;margin-bottom:3px;color:var(--text-primary)}
    .save-box-sub{font-size:11px;color:var(--text-secondary);margin-bottom:10px}
    .save-row{display:flex;gap:8px}
    .save-input{
      flex:1;padding:9px 12px;
      border:1px solid var(--border-hover);
      border-radius:var(--radius-md);
      font-family:'DM Sans',sans-serif;
      font-size:12px;color:var(--text-primary);
      background:var(--surface);outline:none;
    }
    .save-input:focus{border-color:var(--mint)}
    .save-btn{
      font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;
      padding:9px 16px;background:var(--accent);color:#fff;
      border:none;border-radius:var(--radius-md);
      cursor:pointer;white-space:nowrap;transition:opacity 0.2s;
    }
    .save-btn:hover{opacity:0.85}
    .save-success{font-size:12px;color:#1a7a4a;margin-top:6px;display:none}

    /* NOTES */
    .notes{
      font-size:11px;color:var(--text-secondary);
      line-height:1.9;border-top:0.5px solid var(--border);
      padding-top:13px;margin-bottom:1.2rem;
    }
    .notes strong{
      font-size:10px;letter-spacing:0.1em;text-transform:uppercase;
      display:block;margin-bottom:6px;color:var(--text-primary);font-weight:600;
    }
    .travnote{font-size:11px;color:var(--text-tertiary);margin-top:0.6rem;font-style:italic}

    /* ALT CONTACT */
    .alt-contact{display:flex;align-items:center;gap:8px;margin-top:1rem;font-size:12px;color:var(--text-secondary)}
    .txt-link{
      font-size:12px;font-weight:600;
      color:var(--accent);text-decoration:none;
      padding:8px 16px;
      border:1px solid var(--border-hover);
      border-radius:var(--radius-md);
      transition:background 0.2s,border-color 0.2s;
    }
    .txt-link:hover{background:var(--mint-light);border-color:var(--mint)}

    .brst{
      font-family:'DM Sans',sans-serif;font-size:12px;
      padding:8px 16px;background:none;
      border:1px solid var(--border-hover);
      border-radius:var(--radius-md);cursor:pointer;
      color:var(--text-secondary);transition:background 0.2s;
      margin-top:1rem;display:inline-block;
    }
    .brst:hover{background:#f2f6f8;color:var(--text-primary)}

    /* THANK YOU */
    .ty-wrap{padding:3rem 2rem;text-align:center;animation:fadeUp 0.4s ease both}
    .ty-icon{
      width:58px;height:58px;border-radius:50%;
      background:var(--mint-light);border:2px solid var(--mint);
      display:flex;align-items:center;justify-content:center;
      margin:0 auto 1.2rem;font-size:26px;
    }
    .ty-head{
      font-family:'Cormorant Garamond',serif;
      font-size:27px;font-weight:400;margin-bottom:0.5rem;
    }
    .ty-sub{
      font-size:13px;color:var(--text-secondary);
      line-height:1.65;margin-bottom:1.6rem;
      max-width:360px;margin-left:auto;margin-right:auto;
    }
    .ty-step{
      background:#f2f7fa;border-radius:var(--radius-md);
      padding:12px 16px;margin-bottom:8px;
      font-size:12px;color:var(--text-secondary);
      text-align:left;display:flex;align-items:center;gap:12px;
    }
    .ty-num{
      width:24px;height:24px;border-radius:50%;
      background:var(--mint);color:#fff;
      font-size:11px;font-weight:700;
      display:flex;align-items:center;justify-content:center;flex-shrink:0;
    }
    .ty-actions{margin-top:1.6rem;display:flex;flex-direction:column;gap:10px;align-items:center}
    .ty-cal{
      font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;
      padding:12px 26px;background:var(--accent);color:#fff;
      border:none;border-radius:var(--radius-md);cursor:pointer;
      text-decoration:none;transition:opacity 0.2s;display:inline-block;
      box-shadow:0 3px 12px rgba(61,90,107,0.22);
    }
    .ty-cal:hover{opacity:0.88}
    .ty-social{display:flex;gap:8px;align-items:center;justify-content:center;flex-wrap:wrap}
    .ty-restart{
      font-size:12px;color:var(--text-tertiary);
      background:none;border:none;cursor:pointer;
      font-family:'DM Sans',sans-serif;margin-top:4px;
    }
    .ty-restart:hover{color:var(--text-primary)}

    @media(max-width:600px){
      body{padding:0}
      .card{border-radius:0;border-left:none;border-right:none;max-width:100%}
      .step,.rwrap,.ty-wrap{padding:1.4rem 1.2rem}
      .addons-grid{grid-template-columns:1fr}
      .save-row{flex-direction:column}
      .social-strip{flex-direction:column}
    }
  </style>
</head>
<body>

const ADDONS={uplights:'Uplights (10) — $250',mic:'Extra wireless mic — $100+',glow:'Glow sticks bundle — $150+',edits:'Special song edits — $100'};

let ans={},step=0,showThankyou=false;

function getSeasonInfo(){
  if(!ans.date) return null;
  const d=new Date(ans.date),m=d.getMonth()+1;
  if(m>=9&&m<=10) return {type:'peak',label:'Peak Season',msg:'September & October are the busiest months in Sacramento — dates go fast. We recommend reaching out today.'};
  if(m>=5&&m<=8) return {type:'high',label:'High Season',msg:'May–August is high demand. Popular Saturdays often have multiple inquiries. Lock your date in early.'};
  if(m>=3&&m<=4) return {type:'spring',label:'Spring Season',msg:'March–April is a beautiful time for Sacramento weddings with pleasant weather and good availability.'};
  return {type:'offpeak',label:'Off-Peak Season',msg:'November–March is off-peak — you may find more flexibility on dates and potentially more budget-friendly options.'};
}

function isSoon(){
  if(!ans.date)return false;
  const diff=(new Date(ans.date)-new Date())/(1000*60*60*24);
  return diff>0&&diff<=120;
}

function recommend(){
  const{guests,coverage,budget,lighting}=ans;
  // Full production triggers
  if(guests==='xlarge') return['full'];
  if(budget==='premium') return['full'];
  if(lighting==='full_lighting') return['full','collections'];
  // Large guest + full day
  if(guests==='large'){
    if(coverage==='reception') return['collections','scaled'];
    return['collections','scaled'];
  }
  // Medium guests
  if(guests==='medium'){
    if(budget==='budget') return['essential','scaled'];
    if(coverage==='reception') return['essential','scaled'];
    return['scaled','collections'];
  }
  // Small guests
  if(guests==='small'){
    if(coverage==='reception') return['essential'];
    if(budget==='budget'||budget==='mid') return['scaled','essential'];
    return['scaled','essential'];
  }
  return['essential'];
}

function buildEmailLink(pkg){
  const extras=(ans.extras||[]).filter(x=>x!=='none');
  const extrasLine=extras.length?'\nAdd-ons: '+extras.map(e=>ADDONS[e]).join(', '):'';
  const cocktailLine=ans.cocktail&&ans.cocktail!=='no'&&ans.cocktail!=='maybe'?'\nCocktail hour: Yes'+(ans.cocktail==='yes_sep'?' (separate space +$150)':''):'';
  const bilingualLine=ans.bilingual==='yes'?'\nBilingual MC: Yes':'';
  const locationMap={sac:'Sacramento metro',vineyard:'Clarksburg/vineyard area',travel:'Outside Sacramento County'};
  const travelLine='\nVenue location: '+(locationMap[ans.location]||'TBD');
  const dateLine=ans.date?'\nWedding date: '+new Date(ans.date).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}):'';
  const guestLabel={small:'Under 75',medium:'75–150',large:'150–200',xlarge:'200–500+'}[ans.guests]||'';
  const nameLine=ans.firstName?'\nName: '+ans.firstName:'';
  const subj=encodeURIComponent('Wedding Inquiry — '+pkg.name);
  const body=encodeURIComponent(
    'Hi Tony,\n\nI completed the package quiz on your website and I\'m interested in the '+pkg.name+'.\n\n--- My Details ---'+
    nameLine+dateLine+'\nPackage: '+pkg.name+' ('+pkg.price+')'+
    '\nGuest count: '+guestLabel+' guests'+
    '\nCoverage: '+(ans.coverage==='both'?'Ceremony + Reception':'Reception only')+
    cocktailLine+travelLine+extrasLine+
    '\n\nI\'d love to learn more and check availability. Please reach out!\n\nThank you!'
  );
  return 'mailto:'+EMAIL+'?subject='+subj+'&body='+body;
}

function buildSMSLink(pkg){
  const guestLabel={small:'Under 75',medium:'75–150',large:'150–200',xlarge:'200–500+'}[ans.guests]||'';
  const dateStr=ans.date?' on '+new Date(ans.date).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}):'';
  return 'sms:+1'+PHONE+'&body='+encodeURIComponent('Hi Tony! I\'m interested in the '+pkg.name+' for my wedding'+dateStr+' ('+guestLabel+' guests). Can we chat?');
}

function render(){
  const body=document.getElementById('qbody');
  const prog=document.getElementById('prog');
  const pl=document.getElementById('prog-label');
  if(showThankyou){renderThankyou(body,prog,pl);return;}
  if(step>=Qs.length){renderResult(body,prog,pl);return;}
  const pct=Math.round((step/Qs.length)*100);
  prog.style.width=pct+'%';
  pl.textContent=pct+'% complete';
  const q=Qs[step];
  if(q.type==='date'){renderDateStep(body,q);return;}
  if(q.type==='lead'){renderLeadStep(body,q);return;}
  const isMulti=q.multi,sel=ans[q.id];
  const optsHTML=q.opts.map(o=>{
    const active=isMulti?(ans[q.id]||[]).includes(o.v):sel===o.v;
    return '<button class="obtn'+(active?(isMulti?' multi-sel':' sel'):'')+'" data-v="'+o.v+'">'+
      '<span class="omark">'+(active?'✓':'')+'</span>'+
      '<span class="otxt"><strong>'+o.label+'</strong><span>'+o.sub+'</span></span>'+
      (o.badge?'<span class="obtn-badge">'+o.badge+'</span>':'')+
    '</button>';
  }).join('');
  const hasAnswer=isMulti?(ans[q.id]&&ans[q.id].length>0):!!sel;

  // Contextual callout for budget step
  let callout='';
  if(q.id==='budget'&&ans.date){
    const s=getSeasonInfo();
    if(s&&s.type==='offpeak') callout='<div class="info-callout"><span>💡</span><span>Your date is in our off-peak season (Nov–Mar). You may have more flexibility on date and more budget-friendly options. Ask about it during your consultation!</span></div>';
  }

  body.innerHTML='<div class="step">'+
    '<p class="slabel">'+q.label+'</p>'+
    '<h2 class="sq">'+q.question+'</h2>'+
    '<p class="shint">'+q.hint+'</p>'+
    callout+
    (isMulti?'<p class="multi-hint">Select all that apply</p>':'')+
    '<div class="ogrid">'+optsHTML+'</div>'+
    '<div class="navrow">'+
      (step>0?'<button class="bbk" id="bbk">← Back</button>':'<span></span>')+
      '<button class="bnxt" id="bnxt"'+(! hasAnswer?' disabled':'')+'>'+
        (step===Qs.length-1?'See my recommendation →':'Next →')+
      '</button>'+
    '</div>'+
  '</div>';

  body.querySelectorAll('.obtn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const v=btn.dataset.v;
      if(isMulti){
        if(v==='none'){ans[q.id]=['none'];}
        else{let arr=(ans[q.id]||[]).filter(x=>x!=='none');arr=arr.includes(v)?arr.filter(x=>x!==v):[...arr,v];ans[q.id]=arr;}
      }else{ans[q.id]=v;}
      render();
    });
  });
  const nb=document.getElementById('bnxt');if(nb)nb.addEventListener('click',()=>{step++;render();});
  const bb=document.getElementById('bbk');if(bb)bb.addEventListener('click',()=>{step--;render();});
}

function renderDateStep(body,q){
  const val=ans.date||'';
  body.innerHTML='<div class="step">'+
    '<p class="slabel">'+q.label+'</p>'+
    '<h2 class="sq">'+q.question+'</h2>'+
    '<p class="shint">'+q.hint+'</p>'+
    '<div class="field-wrap"><input type="date" class="field-input" id="date-inp" value="'+val+'" min="'+new Date().toISOString().split('T')[0]+'" /></div>'+
    '<div class="navrow"><span></span><button class="bnxt" id="bnxt"'+(! val?' disabled':'')+'>Next →</button></div>'+
  '</div>';
  const inp=document.getElementById('date-inp');
  inp.addEventListener('change',()=>{ans.date=inp.value;document.getElementById('bnxt').disabled=!inp.value;});
  document.getElementById('bnxt').addEventListener('click',()=>{step++;render();});
}

function renderLeadStep(body,q){
  const firstName=ans.firstName||'',email=ans.leadEmail||'';
  body.innerHTML='<div class="step">'+
    '<p class="slabel">'+q.label+'</p>'+
    '<h2 class="sq">'+q.question+'</h2>'+
    '<p class="shint">'+q.hint+'</p>'+
    '<div class="field-wrap"><label>First name</label><input type="text" class="field-input" id="lead-name" placeholder="Your first name" value="'+firstName+'" /></div>'+
    '<div class="field-wrap"><label>Email address</label><input type="email" class="field-input" id="lead-email" placeholder="you@email.com" value="'+email+'" /></div>'+
    '<p class="field-privacy">🔒 Only used to send your results. No spam, ever.</p>'+
    '<div class="navrow"><button class="bbk" id="bbk">← Back</button><button class="bnxt" id="bnxt"'+((!firstName||!email)?' disabled':'')+'>See my recommendation →</button></div>'+
  '</div>';
  const ni=document.getElementById('lead-name'),ei=document.getElementById('lead-email');
  function chk(){ans.firstName=ni.value.trim();ans.leadEmail=ei.value.trim();document.getElementById('bnxt').disabled=!(ans.firstName&&ans.leadEmail&&ans.leadEmail.includes('@'));}
  ni.addEventListener('input',chk);ei.addEventListener('input',chk);
  document.getElementById('bnxt').addEventListener('click',()=>{step++;render();});
  document.getElementById('bbk').addEventListener('click',()=>{step--;render();});
}

    (ans.location==='travel'||ans.location==='vineyard'?'<p class="travnote">* Your venue is outside Sacramento metro — a travel fee will be reflected in your final quote.</p>':'')+
    (ans.bilingual==='yes'?'<p class="travnote" style="margin-top:.4rem">* Bilingual Spanish/English MC services will be confirmed during your consultation.</p>':'')+
    '<div class="alt-contact"><span>Prefer to text?</span><a class="txt-link" href="'+buildSMSLink(primary)+'">Text us instead</a></div>'+
    '<button class="brst" id="brst">← Start over</button>'+
  '</div>';

  document.querySelectorAll('.pkcard').forEach(card=>{
    card.addEventListener('click',(e)=>{e.preventDefault();window.location.href=card.getAttribute('href');setTimeout(()=>{showThankyou=true;render();},500);});
  });

  document.getElementById('save-btn').addEventListener('click',()=>{
    const se=document.getElementById('save-email').value.trim();
    if(!se||!se.includes('@'))return;
    const pkg=PKGS[recommend()[0]];
    const subj=encodeURIComponent('Your Pumeon Productions Package Recommendation');
    const bt=encodeURIComponent(
      'Hi '+firstName+',

Here's your package recommendation from Pumeon Productions:

'+
      '📦 '+pkg.name+'
'+pkg.price+' · '+pkg.hours+' · '+pkg.guests+'

'+
      'Includes:
'+pkg.inc.map(i=>'• '+i).join('
')+'

'+
      'Ready to book?
Visit: '+BOOKING_URL+'
Or email Tony: '+EMAIL+'

'+
      'See our work:
🌐 '+WEBSITE+'
📸 '+INSTAGRAM+'

Pumeon Productions'
    );
    window.location.href='mailto:'+se+'?subject='+subj+'&body='+bt;
    document.getElementById('save-success').style.display='block';
  });

  document.getElementById('brst').addEventListener('click',()=>{ans={};step=0;showThankyou=false;render();});
}

          'Visit pumeon.net</a>'+
        '<a class="social-link ig" href="'+INSTAGRAM+'" target="_blank" rel="noopener" style="font-size:12px;padding:7px 14px;">'+
          '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>'+
          'Follow on Instagram</a>'+

  document.getElementById('ty-restart').addEventListener('click',()=>{ans={};step=0;showThankyou=false;render();});
}

render();
</script>
